<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cockroach Janta Party — Projects</title>
  <link rel="icon" href="bot-detector/assets/icon128.png" />
  <style>
    :root { --bg: #0a0a0a; --border: #262626; --ink: #ededed; --muted: #a1a1a1; }
    body {
      margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, Inter, sans-serif;
      text-align: center; padding: 24px; box-sizing: border-box;
    }
    img { width: 80px; height: 80px; border-radius: 50%; }
    h1 { font-size: 28px; letter-spacing: -0.02em; margin: 18px 0 6px; }
    p { color: var(--muted); margin: 0 0 28px; }
    a.card {
      color: var(--ink); text-decoration: none; border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 22px; display: inline-block;
    }
    a.card:hover { border-color: #3d3d3d; }
    a.site { color: var(--muted); font-size: 14px; margin-top: 28px; display: inline-block; }
    .tri { position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(to right, #ff9933 0 33.4%, #fff 33.4% 66.7%, #138808 66.7% 100%); }
  </style>
</head>
<body>
  <img src="bot-detector/assets/icon128.png" alt="Cockroach Janta Party logo" />
  <h1>Cockroach Janta Party</h1>
  <p>open tools by the cockroaches of India</p>
  <a class="card" href="bot-detector/">🪳 CJP Bot Detector — catch the bots in YouTube comments</a>
  <a class="site" href="https://www.cockroachjantaparty.com/">official website →</a>
  <div class="tri"></div>
</body>
</html>
